services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: faang_db
    environment:
      POSTGRES_USER: interview_user
      POSTGRES_PASSWORD: interview_pass_secure
      POSTGRES_DB: interview_prep_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d interview_prep_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faang_network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faang_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://interview_user:interview_pass_secure@postgres:5432/interview_prep_db
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-me}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      JUDGE0_URL: ${JUDGE0_URL:-}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    command: npm run dev
    networks:
      - faang_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React App
  frontend:
    image: node:20-alpine
    container_name: faang_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:5000
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - faang_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Adminer for database management (optional)
  adminer:
    image: adminer:latest
    container_name: faang_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - faang_network
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:

networks:
  faang_network:
    driver: bridge
