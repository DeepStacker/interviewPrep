name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: interview_user
          POSTGRES_PASSWORD: interview_pass_secure
          POSTGRES_DB: interview_prep_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U interview_user -d interview_prep_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://interview_user:interview_pass_secure@localhost:5432/interview_prep_db
      JWT_SECRET: ci-test-secret
      GROQ_API_KEY: test-key
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      FRONTEND_URL: http://localhost:5173
      EXPECT_READY: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    env:
      VITE_GOOGLE_CLIENT_ID: test-client-id
      VITE_PROXY_TARGET: http://localhost:5000
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
